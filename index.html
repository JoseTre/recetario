<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recetario de la Abuela - Cakes & Cookies</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdf6ec; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .controls { margin-bottom: 20px; }
        select { padding: 10px; font-size: 16px; border-radius: 8px; border: 1px solid #dcb289; }
        .card { background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 90%; max-width: 500px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #eee; }
        .card img { width: 100%; height: auto; object-fit: contain; background: #fff; max-height: 400px; }
        .card-content { padding: 20px; text-align: center; }
        h1 { margin: 10px 0; color: #5a3825; font-size: 24px; }
        .category { color: #e67e22; font-weight: bold; text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }
        .tags { margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .tag { background: #fbeee6; color: #d35400; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .navigation { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; width: 100%; max-width: 500px; }
        button { background: #e67e22; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #d35400; }
        .counter { font-size: 16px; color: #7f8c8d; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color: #5a3825; margin: 0;">🍰 Álbum de Recetas Digitales</h2>
    </div>

    <div class="controls">
        <select id="filtroCategoria" onchange="filtrarPorCategoria()">
            <option value="TODAS">📁 Todas las Categorías</option>
        </select>
    </div>

    <div class="card">
        <img id="tarjetaImagen" src="" alt="Cargando receta...">
        <div class="card-content">
            <div id="tarjetaCategoria" class="category">-</div>
            <h1 id="tarjetaTitulo">Cargando base de datos...</h1>
            <div id="tarjetaTags" class="tags"></div>
        </div>
    </div>

    <div class="navigation">
        <button id="btnAnt" onclick="navegar(-1)" disabled>◀ Anterior</button>
        <span id="registroContador" class="counter">Tarjeta 0 de 0</span>
        <button id="btnSig" onclick="navegar(1)" disabled>Siguiente ▶</button>
    </div>

    <script>
        let recetasGlobales = [];
        let recetasFiltradas = [];
        let indiceActual = 0;
        const CARPETA_IMAGENES = "smart_cropped_recipes";

        document.addEventListener("DOMContentLoaded", () => {
            fetch("recetas_completas_database.json")
                .then(response => {
                    if (!response.ok) throw new Error("No se pudo cargar el archivo JSON");
                    return response.json();
                })
                .then(data => {
                    recetasGlobales = Object.values(data);
                    recetasFiltradas = [...recetasGlobales];
                    poblarCategorias();
                    actualizarPantalla();
                })
                .catch(error => {
                    console.error("Error inicializando la aplicación:", error);
                    document.getElementById("tarjetaTitulo").innerText = "Error al cargar la base de datos";
                });
                
            document.addEventListener("keydown", (e) => {
                if (e.key === "ArrowLeft") navegar(-1);
                if (e.key === "ArrowRight") navegar(1);
            });
        });

        function poblarCategorias() {
            const selector = document.getElementById("filtroCategoria");
            const categorias = new Set();
            recetasGlobales.forEach(r => {
                if (r.categoria && r.categoria.trim() !== "") {
                    categorias.add(r.categoria.trim());
                }
            });
            Array.from(categorias).sort().forEach(cat => {
                const opcion = document.createElement("option");
                opcion.value = cat;
                opcion.textContent = cat;
                selector.appendChild(opcion);
            });
        }

        function filtrarPorCategoria() {
            const categoriaSeleccionada = document.getElementById("filtroCategoria").value;
            if (categoriaSeleccionada === "TODAS") {
                recetasFiltradas = [...recetasGlobales];
            } else {
                recetasFiltradas = recetasGlobales.filter(r => r.categoria === categoriaSeleccionada);
            }
            indiceActual = 0;
            actualizarPantalla();
        }

        function navegar(direccion) {
            let nuevoIndice = indiceActual + direccion;
            if (nuevoIndice >= 0 && nuevoIndice < recetasFiltradas.length) {
                indiceActual = nuevoIndice;
                actualizarPantalla();
            }
        }

        function actualizarPantalla() {
            const total = recetasFiltradas.length;
            if (total === 0) {
                document.getElementById("tarjetaImagen").src = "";
                document.getElementById("tarjetaTitulo").innerText = "No hay recetas en esta sección";
                document.getElementById("tarjetaCategoria").innerText = "-";
                document.getElementById("tarjetaTags").innerHTML = "";
                document.getElementById("registroContador").innerText = "Tarjeta 0 de 0";
                document.getElementById("btnAnt").disabled = true;
                document.getElementById("btnSig").disabled = true;
                return;
            }
            
            const receta = recetasFiltradas[indiceActual];
            document.getElementById("tarjetaImagen").src = `${CARPETA_IMAGENES}/${receta.archivo}`;
            document.getElementById("tarjetaImagen").alt = receta.titulo;
            document.getElementById("tarjetaTitulo").innerText = receta.titulo;
            document.getElementById("tarjetaCategoria").innerText = receta.categoria || "Sin categoría";
            
            const contenedorTags = document.getElementById("tarjetaTags");
            contenedorTags.innerHTML = "";
            if (receta.palabras_clave && receta.palabras_clave.length > 0) {
                receta.palabras_clave.forEach(tag => {
                    const span = document.createElement("span");
                    span.className = "tag";
                    span.innerText = tag;
                    contenedorTags.appendChild(span);
                });
            } else {
                contenedorTags.innerHTML = "<span style='color:#666; font-style:italic;'>Ninguna</span>";
            }
            
            document.getElementById("registroContador").innerText = `Tarjeta ${indiceActual + 1} de ${total}`;
            document.getElementById("btnAnt").disabled = (indiceActual === 0);
            document.getElementById("btnSig").disabled = (indiceActual === total - 1);
        }
    </script>
</body>
</html>
